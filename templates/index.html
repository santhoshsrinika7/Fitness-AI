<!DOCTYPE html>
<html>
<head>
    <title>Fitness Recommendation System</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            text-align:center;
            padding-top:50px;
        }

        .container{
            background:white;
            width:400px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input, select{
            width:90%;
            padding:10px;
            margin:10px;
            font-size:16px;
        }

        button{
            background:#28a745;
            color:white;
            border:none;
            padding:12px 20px;
            font-size:16px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#218838;
        }

        h3{
            color:blue;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Fitness Recommendation System</h1>

<form action="/recommend" method="POST">
<label><b>Name</b></label><br>
<input type="text" name="name" required><br>

<label><b>Age</b></label><br>
<input type="number" name="Age" required><br>
    
<label><b>Height(cm)</b></label><br>
<input type="number" name="height" required><br>

<label><b>Weight(kg)</b></label><br>
<input type="number" name="weight" required><br>

<label><b>Gender</b></label><br>
<select name="gender">
    <option>Male</option>
    <option>Female</option>
</select><br>

<label><b>Goal</b></label><br>
<select name="goal">
    <option>Weight Loss</option>
    <option>Muscle Gain</option>
    <option>Stay Fit</option>
</select><br>

<button type="submit">Get Recommendation</button>

</form>

{% if recommendation %}

<hr>

<h2>Your Recommendation</h2>

<h3>{{ recommendation }}</h3>

{% endif %}

</div>

</body>
</html>
