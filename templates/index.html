<!DOCTYPE html>
<html>
<head>
    <title>NEXORA Fitness</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Hero Section -->
<div class="hero">
    <div class="hero-content">
        <img src="{{ url_for('static', filename='images/yoga.svg') }}" 
             alt="Yoga Illustration" class="hero-img-small">
        <div class="hero-text">
            <h1>🧘‍♀️ NEXORA</h1>
            <p>Next Gen Optimized Recommendation AI</p>
            <p class="quote">"Today's mission: Stay fit, stay strong"</p>
        </div>
    </div>
</div>


    <!-- Form Section -->
    <div class="form-card">
        <form action="/recommend" method="POST">
            <label>Name:</label>
            <input type="text" name="name" required>

            <label>Age:</label>
            <input type="number" name="age" required>

            <label>Gender:</label>
            <select name="gender">
                <option>Male</option>
                <option>Female</option>
            </select>

            <label>Height (cm):</label>
            <input type="number" name="height" required>

            <label>Weight (kg):</label>
            <input type="number" name="weight" required>

            <label>Diet Type:</label>
            <select name="diet_type">
                <option>Vegetarian</option>
                <option>Non-Vegetarian</option>
            </select>

            <label>Goal:</label>
            <select name="goal">
                <option>Weight Loss</option>
                <option>Muscle Gain</option>
                <option>Maintain</option>
            </select>

            <button type="submit">Get Recommendation</button>
        </form>
    </div>

</body>
</html>
