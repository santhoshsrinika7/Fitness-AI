<!DOCTYPE html>

<html>
<head>
    <title>Fitness Recommendation System</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

```
    .container{
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
        width:350px;
    }

    h1{
        text-align:center;
    }

    input, select{
        width:100%;
        padding:10px;
        margin:8px 0;
    }

    button{
        width:100%;
        padding:10px;
        background:green;
        color:white;
        border:none;
        cursor:pointer;
    }

    button:hover{
        background:darkgreen;
    }
</style>
```

</head>
<body>

<div class="container">

```
<h1>Fitness Recommendation System</h1>

<form action="result1.html" method="GET">


    <label>Name</label>
    <input type="text" name="name" required>

    <label>Age</label>
    <input type="number" name="age" required>
    <label for="diet_type">Diet Preference:</label>
<select name="diet_type" required>
  <option value="Vegetarian">Vegetarian</option>
  <option value="Non-Vegetarian">Non-Vegetarian</option>
</select>


    <label>Gender</label>
    <select name="gender" required>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>

    <label>Height (cm)</label>
    <input type="number" step="0.1" name="height" required>

    <label>Weight (kg)</label>
    <input type="number" step="0.1" name="weight" required>

    <label>Goal</label>
    <select name="goal" required>
        <option value="Weight Loss">Weight Loss</option>
        <option value="Muscle Gain">Muscle Gain</option>
        <option value="Maintain Fitness">Maintain Fitness</option>
    </select>

    <button type="submit">Get Recommendation</button>

</form>
```

</div>

</body>
</html>
