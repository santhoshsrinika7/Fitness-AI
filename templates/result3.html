<!DOCTYPE html>
<html lang="en">

<head>

<title>NEXORA - Workout Plan</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:'Poppins',Arial,sans-serif;

    background:linear-gradient(135deg,#edf7f6,#d8ecff,#ffffff);

    min-height:100vh;

    padding:30px;

    color:#1f2937;

}


/* HEADER */

.header{

    text-align:center;

    margin-bottom:25px;

}


.logo{

    font-size:45px;

    font-weight:700;

    color:#2563eb;

    letter-spacing:2px;

}


.subtitle{

    color:#475569;

    font-size:18px;

}



/* NAVIGATION */

.dashboard-nav{

    display:flex;

    justify-content:center;

    gap:12px;

    flex-wrap:wrap;

    margin:25px auto;

}


.dashboard-nav a{

    text-decoration:none;

    color:#334155;

    background:rgba(255,255,255,.65);

    padding:12px 18px;

    border-radius:30px;

    font-weight:600;

    box-shadow:0 5px 15px rgba(0,0,0,.08);

    transition:.3s;

}


.dashboard-nav a:hover{

    background:#2563eb;

    color:white;

    transform:translateY(-3px);

}



/* MAIN CONTAINER */


.container{

    width:90%;

    max-width:900px;

    margin:auto;

    background:rgba(255,255,255,.75);

    backdrop-filter:blur(20px);

    padding:40px;

    border-radius:30px;

    box-shadow:0 20px 40px rgba(0,0,0,.12);

}



h1{

    text-align:center;

    color:#16324F;

    margin-bottom:25px;

}



.card{

    background:#f8fbff;

    padding:30px;

    border-radius:22px;

    box-shadow:0 8px 20px rgba(0,0,0,.08);

}



/* WORKOUT ITEMS */


ul{

    list-style:none;

}


li{

    background:white;

    padding:18px;

    margin:15px 0;

    border-radius:15px;

    font-size:19px;

    font-weight:600;

    box-shadow:0 5px 15px rgba(0,0,0,.08);

    transition:.3s;

}



li:hover{

    transform:translateX(8px);

    background:#eef7ff;

}



/* HOME BUTTON */


.home-btn{

    text-align:center;

    margin-top:30px;

}


.home-btn a{

    text-decoration:none;

    background:#2563eb;

    color:white;

    padding:14px 30px;

    border-radius:30px;

    font-weight:600;

}


.home-btn a:hover{

    background:#1d4ed8;

}




@media(max-width:700px){

.container{

width:100%;

padding:25px;

}


.logo{

font-size:35px;

}


li{

font-size:16px;

}


}


</style>


</head>


<body>



<div class="header">


<div class="logo">
NEXORA
</div>


<div class="subtitle">
Your AI Fitness Report
</div>


</div>






<div class="dashboard-nav">


<a href="/result1">📊 BMI</a>

<a href="/result2">🎯 Goal</a>

<a href="/result3">🏋️ Workout</a>

<a href="/result4">🥗 Diet</a>

<a href="/result5">💧 Lifestyle</a>

<a href="/summary">📄 Summary</a>


</div>







<div class="container">


<h1>🏋️ WORKOUT PLAN</h1>



<div class="card">


<ul>

{% for item in workout %}

<li>{{item}}</li>

{% endfor %}

</ul>



</div>




<div class="home-btn">


<a href="/">
🏠 Back to Home
</a>


</div>



</div>





</body>

</html>
